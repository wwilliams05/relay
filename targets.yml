# Relay — ATS target companies for job discovery (N-1).
#
# Relay queries each company's OFFICIAL applicant-tracking-system (ATS) job board via
# its public JSON API — free, no auth, structured, and (unlike scraping Indeed/LinkedIn)
# never rate-limited or blocked. See src/relay/jobs.py.
#
# Fields per entry:
#   company  — display name written to the Jobs tab
#   provider — one of: greenhouse | lever | ashby | workday | amazon
#   token    — the board slug in the ATS URL (greenhouse/lever/ashby). Find it on the
#              company's careers page:
#                greenhouse -> boards.greenhouse.io/<token>
#                ashby      -> jobs.ashbyhq.com/<token>
#                lever      -> jobs.lever.co/<token>
#   domain   — the company's website domain; scopes Apollo people search (N2) to the
#              right org when you run find-people for a pursued job. Optional but
#              strongly recommended.
#   workday entries use tenant + dc + site instead of token (see that section).
#
# Only internship / co-op titles are kept, and fit-scoring against your résumé + notes
# ranks them (business/ops/PM roles rise; off-field engineering/clinical roles sink and
# are dropped below RELAY_JOBS_MIN_FIT). Non-US locations are dropped by default
# (RELAY_JOBS_US_ONLY=0 to disable). Edit freely — this file, if present, replaces the
# built-in defaults. Delete it to fall back to those defaults.
#
# NOT reachable here: Google/Meta/Apple/Microsoft run proprietary career sites without
# a stable public JSON API (Google retired its v3 careers API). Amazon is the
# exception — its careers site exposes /en/search.json, wired as provider: amazon.

targets:

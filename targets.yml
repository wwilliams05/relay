# Relay — ATS target companies for job discovery (N-1).
#
# Relay queries each company's OFFICIAL applicant-tracking-system (ATS) job board via
# its public JSON API — free, no auth, structured, and (unlike scraping Indeed/LinkedIn)
# never rate-limited or blocked. See src/relay/jobs.py.
#
# Each entry needs three fields:
#   company  — display name written to the Jobs tab
#   provider — one of: greenhouse | lever | ashby
#   token    — the board slug in the ATS URL. Find it from the company's careers page:
#                greenhouse -> boards.greenhouse.io/<token>   (or job-boards.greenhouse.io/<token>)
#                ashby      -> jobs.ashbyhq.com/<token>
#                lever      -> jobs.lever.co/<token>
#
# Only internship / co-op titles are kept, and fit-scoring against your résumé + notes
# ranks them (business/ops/PM roles rise; off-field engineering/clinical roles sink and
# are dropped below RELAY_JOBS_MIN_FIT). Edit freely — this file, if present, replaces
# the built-in defaults. Delete it to fall back to those defaults.
#
# NOTE: big consulting/finance names (McKinsey, BCG, Bain, Accenture, Deloitte, Visa,
# Mastercard) and some primes (Tesla) run their own/Workday career sites and are NOT
# reachable via these ATS APIs — they can't be added here. All tokens below are verified.

targets:
